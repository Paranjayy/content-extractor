name: CI

on:
  push:
    # Every push to every branch triggers a build
    branches: [ '**' ]
  pull_request:
    # Every PR also runs the full check
    branches: [ '**' ]

jobs:
  build:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Lint
        working-directory: app
        run: npm run lint

      - name: Build (TypeScript + Vite)
        working-directory: app
        run: npm run build

      - name: Upload build artifact
        # Keep the built files for 7 days so you can inspect or download them
        uses: actions/upload-artifact@v4
        with:
          name: react-app-dist-${{ github.sha }}
          path: app/dist/
          retention-days: 7
