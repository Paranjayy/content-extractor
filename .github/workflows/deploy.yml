name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# Do NOT cancel in-progress deployments as we want to allow them to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job — assembles the site artifact for GitHub Pages deployment
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install React app dependencies
        working-directory: app
        run: npm ci

      - name: Build React app
        working-directory: app
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Assemble site
        run: |
          mkdir -p _site

          # React app at root — serves as the primary UI
          cp -r app/dist/. _site/

          # Legacy HTML tools under /legacy/ for backwards compatibility
          mkdir -p _site/legacy
          cp -r frontend/. _site/legacy/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job — runs only when the push lands on main (guaranteed by the on.push trigger above)
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 